<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real Estate Prices — Vračar 2025</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c-bg: #f4f1ec; --c-surface: #faf8f5; --c-border: rgba(0,0,0,0.1);
      --c-text: #1a1a18; --c-muted: #6b6860;
      --font-sans: 'DM Sans', sans-serif; --font-mono: 'DM Mono', monospace;
      --radius: 10px;
    }
    html, body { height: 100%; background: var(--c-bg); font-family: var(--font-sans); color: var(--c-text); overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 20px; background: var(--c-surface);
      border-bottom: 1px solid var(--c-border); flex-shrink: 0; gap: 20px;
    }
    #header-left { display: flex; flex-direction: column; gap: 1px; }
    #header h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
    #header p { font-size: 11px; color: var(--c-muted); font-family: var(--font-mono); }
    #controls { display: flex; align-items: center; gap: 28px; }
    .control-group { display: flex; flex-direction: column; gap: 4px; }
    .control-label { font-size: 10px; font-family: var(--font-mono); color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .control-row { display: flex; align-items: center; gap: 10px; }
    .control-value { font-size: 13px; font-family: var(--font-mono); font-weight: 500; min-width: 36px; text-align: right; }
    input[type="range"] { -webkit-appearance: none; appearance: none; height: 3px; background: var(--c-border); border-radius: 2px; outline: none; cursor: pointer; width: 120px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--c-text); border: 2px solid var(--c-surface); box-shadow: 0 0 0 1px var(--c-text); cursor: pointer; }

    #map-wrap { position: relative; flex: 1; cursor: none; }
    #map { position: absolute; inset: 0; z-index: 1; }
    #lens-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

    #legend {
      position: absolute; bottom: 28px; left: 20px; z-index: 20;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius); padding: 12px 16px;
    }
    .leg-title { font-size: 10px; font-family: var(--font-mono); color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .leg-bar { width: 140px; height: 7px; border-radius: 3px; margin-bottom: 5px; background: linear-gradient(to right, #4a7c3f, #7ab648, #c8cc3e, #e8b84b, #d4876a, #c4788a); }
    .leg-labels { display: flex; justify-content: space-between; font-size: 10px; font-family: var(--font-mono); color: var(--c-muted); }

    #price-readout { position: absolute; z-index: 30; pointer-events: none; display: none; transform: translate(14px, -50%); }
    #price-readout-inner { background: var(--c-text); color: white; font-family: var(--font-mono); font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 6px; white-space: nowrap; }
    #price-readout-inner span { opacity: 0.6; font-weight: 400; margin-left: 3px; font-size: 10px; }

    #hint { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 20; background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 20px; padding: 6px 14px; font-size: 11px; color: var(--c-muted); font-family: var(--font-mono); pointer-events: none; transition: opacity 0.4s; }
    #hint.hidden { opacity: 0; }

    .leaflet-attribution-flag { display: none !important; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-left">
      <h1>Real Estate Prices — Vračar 2025</h1>
      <p>IDW interpolation · hover to explore</p>
    </div>
    <div id="controls">
      <div class="control-group">
        <div class="control-label">Lens size</div>
        <div class="control-row">
          <input type="range" id="lens-slider" min="40" max="160" step="5" value="80">
          <span class="control-value" id="lens-val">80</span>
        </div>
      </div>
    </div>
  </div>
  <div id="map-wrap">
    <div id="map"></div>
    <canvas id="lens-canvas"></canvas>
    <div id="legend">
      <div class="leg-title">€ / m²</div>
      <div class="leg-bar"></div>
      <div class="leg-labels"><span>1.750</span><span>5.300</span><span>8.861</span></div>
    </div>
    <div id="price-readout"><div id="price-readout-inner">— <span>€/m²</span></div></div>
    <div id="hint">Move cursor over the map to reveal prices</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://unpkg.com/georaster@1.6.0/georaster.browser.bundle.js"></script>
<script src="https://unpkg.com/georaster-layer-for-leaflet@2.3.1/dist/georaster-layer-for-leaflet.min.js"></script>

<script>
  // Extent from Border GeoJSON
  var BOUNDS = {
    minLng: 20.463511124853436,
    maxLng: 20.497777009078433,
    minLat: 44.790249145103495,
    maxLat: 44.81048992309964
  };

  var PRICE_MIN = 1750, PRICE_MAX = 8861;

  // Color scale matching ArcGIS IDW ramp: dark green → yellow-green → yellow → orange → salmon
  function priceToColor(value) {
    if (value === null || value === undefined || isNaN(value)) return null;
    if (value > 99990) return null; // nodata
    var t = Math.min(1, Math.max(0, (value - PRICE_MIN) / (PRICE_MAX - PRICE_MIN)));
    var stops = [
      [0.00, [74, 124, 63]],
      [0.20, [122, 182, 72]],
      [0.40, [200, 204, 62]],
      [0.60, [232, 184, 75]],
      [0.80, [212, 135, 106]],
      [1.00, [196, 120, 138]]
    ];
    for (var i = 0; i < stops.length - 1; i++) {
      if (t >= stops[i][0] && t <= stops[i+1][0]) {
        var s = (t - stops[i][0]) / (stops[i+1][0] - stops[i][0]);
        var c0 = stops[i][1], c1 = stops[i+1][1];
        return [
          Math.round(c0[0] + s*(c1[0]-c0[0])),
          Math.round(c0[1] + s*(c1[1]-c0[1])),
          Math.round(c0[2] + s*(c1[2]-c0[2])),
          210
        ];
      }
    }
    return null;
  }

  // Leaflet map
  var map = L.map("map", { zoomControl: true, attributionControl: true }).setView([44.800, 20.480], 14);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    subdomains: ["a","b","c"], maxZoom: 19,
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>'
  }).addTo(map);

  // Border GeoJSON
  fetch("Border.geojson")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      L.geoJSON(data, {
        style: { color: "#1a1a18", weight: 2, fillOpacity: 0, opacity: 0.8 }
      }).addTo(map);
    });

  // Load GeoTIFF
  var georasterData = null;
  var georasterLayer = null;

  fetch("IDW.tif")
    .then(function(r) { return r.arrayBuffer(); })
    .then(function(buf) { return parseGeoraster(buf); })
    .then(function(gr) {
      georasterData = gr;

      // Create colored raster layer — hidden by default
      georasterLayer = new GeoRasterLayer({
        georaster: gr,
        opacity: 0,  // hidden — only shown through lens
        pixelValuesToColorFn: function(vals) {
          var v = vals[0];
          if (v === null || v === undefined || isNaN(v) || v > 99990) return null;
          var c = priceToColor(v);
          if (!c) return null;
          return "rgba(" + c[0] + "," + c[1] + "," + c[2] + "," + (c[3]/255) + ")";
        },
        resolution: 256
      });
      georasterLayer.addTo(map);
    })
    .catch(function(e) { console.error("Failed to load GeoTIFF:", e); });

  // Canvas
  var lensC = document.getElementById("lens-canvas");
  var mw    = document.getElementById("map-wrap");
  var priceReadout = document.getElementById("price-readout");
  var priceInner   = document.getElementById("price-readout-inner");
  var hint  = document.getElementById("hint");
  var lensR = 80, mouseX = -1, mouseY = -1, hintHidden = false;

  function resize() { lensC.width = mw.offsetWidth; lensC.height = mw.offsetHeight; }
  resize();
  window.addEventListener("resize", resize);

  // Get exact pixel value from georaster at map point
  function getValueAtLatLng(lat, lng) {
    if (!georasterData) return null;
    var gr = georasterData;
    // Convert lat/lng to raster pixel
    var col = Math.floor((lng - gr.xmin) / gr.pixelWidth);
    var row = Math.floor((gr.ymax - lat) / gr.pixelHeight);
    if (col < 0 || row < 0 || col >= gr.width || row >= gr.height) return null;
    var val = gr.values[0][row][col];
    if (val === null || val === undefined || isNaN(val) || val > 99990) return null;
    return val;
  }

  function drawLens() {
    var ctx = lensC.getContext("2d");
    ctx.clearRect(0, 0, lensC.width, lensC.height);
    if (mouseX < 0 || !georasterData) return;

    var R = lensR, mx = mouseX, my = mouseY;
    var mwRect = mw.getBoundingClientRect();

    // Get map bounds visible on screen
    var mapBounds = map.getBounds();
    var mapSize   = map.getSize();

    // Draw raster pixels inside lens circle
    // For each pixel in the lens area, compute lat/lng and look up raster value
    var step = 2; // pixels per sample (performance vs quality)
    var imgData = ctx.createImageData(lensC.width, lensC.height);

    for (var py = Math.floor(my - R); py <= Math.ceil(my + R); py += step) {
      for (var px = Math.floor(mx - R); px <= Math.ceil(mx + R); px += step) {
        var dx = px - mx, dy = py - my;
        if (dx*dx + dy*dy > R*R) continue;
        if (px < 0 || py < 0 || px >= lensC.width || py >= lensC.height) continue;

        // Convert canvas pixel to lat/lng
        var latLng = map.containerPointToLatLng([px, py]);
        var val = getValueAtLatLng(latLng.lat, latLng.lng);
        if (val === null) continue;

        var c = priceToColor(val);
        if (!c) continue;

        for (var oy = 0; oy < step && py+oy < lensC.height; oy++) {
          for (var ox = 0; ox < step && px+ox < lensC.width; ox++) {
            var ddx = (px+ox) - mx, ddy = (py+oy) - my;
            if (ddx*ddx + ddy*ddy > R*R) continue;
            var idx = ((py+oy) * lensC.width + (px+ox)) * 4;
            imgData.data[idx]   = c[0];
            imgData.data[idx+1] = c[1];
            imgData.data[idx+2] = c[2];
            imgData.data[idx+3] = c[3];
          }
        }
      }
    }
    ctx.putImageData(imgData, 0, 0);

    // Get price at center
    var centerLatLng = map.containerPointToLatLng([mx, my]);
    var centerVal = getValueAtLatLng(centerLatLng.lat, centerLatLng.lng);
    priceInner.innerHTML = centerVal !== null
      ? "~" + Math.round(centerVal).toLocaleString("sr-RS") + " <span>\u20ac/m\u00b2</span>"
      : "\u2014 <span>\u20ac/m\u00b2</span>";

    // Ring
    ctx.beginPath(); ctx.arc(mx, my, R, 0, Math.PI*2);
    ctx.strokeStyle = "rgba(255,255,255,0.88)"; ctx.lineWidth = 2; ctx.stroke();
    ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.lineWidth = 0.5; ctx.stroke();

    // Crosshair
    ctx.save(); ctx.strokeStyle = "rgba(255,255,255,0.65)"; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(mx-10, my); ctx.lineTo(mx+10, my);
    ctx.moveTo(mx, my-10); ctx.lineTo(mx, my+10);
    ctx.stroke(); ctx.restore();

    // Center dot
    ctx.beginPath(); ctx.arc(mx, my, 2.5, 0, Math.PI*2);
    ctx.fillStyle = "white"; ctx.fill();
  }

  var drawTimeout = null;

  mw.addEventListener("mousemove", function(e) {
    var rect = mw.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;

    priceReadout.style.display = "block";
    priceReadout.style.left = mouseX + "px";
    priceReadout.style.top  = mouseY + "px";

    if (!hintHidden) { hint.classList.add("hidden"); hintHidden = true; }

    if (drawTimeout) clearTimeout(drawTimeout);
    drawTimeout = setTimeout(drawLens, 30);
  });

  mw.addEventListener("mouseleave", function() {
    mouseX = -1; mouseY = -1;
    priceReadout.style.display = "none";
    lensC.getContext("2d").clearRect(0, 0, lensC.width, lensC.height);
  });

  map.on("move zoom", function() {
    if (mouseX >= 0) { if (drawTimeout) clearTimeout(drawTimeout); drawTimeout = setTimeout(drawLens, 60); }
  });

  var lensSlider = document.getElementById("lens-slider");
  var lensVal    = document.getElementById("lens-val");
  lensSlider.addEventListener("input", function() {
    lensR = parseInt(this.value);
    lensVal.textContent = lensR;
    if (mouseX >= 0) drawLens();
  });
</script>
</body>
</html>
